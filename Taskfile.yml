version: "3"

tasks:
  default:
    desc: Start services and show status.
    cmds:
      - task: start

  submodule:init:
    desc: Initialize git submodules required by embedded assets.
    cmds:
      - git submodule update --init --recursive

  worktree:env:
    desc: Symlink primary .env and ensure .env.local ports. Usage - task worktree:env [-- path]
    cmds:
      - bash deployment/scripts/worktree-env.sh {{.CLI_ARGS}}

  worktree:add:
    desc: Create .worktrees/<branch>, link .env, init submodules, assign ports. Usage - task worktree:add -- <branch>
    cmds:
      - |
          set -euo pipefail
          branch="{{.CLI_ARGS}}"
          if [ -z "${branch}" ]; then
            echo "usage: task worktree:add -- <branch>" >&2
            exit 1
          fi
          path=".worktrees/${branch}"
          if [ -e "${path}" ]; then
            echo "error: ${path} already exists" >&2
            exit 1
          fi
          if git show-ref --verify --quiet "refs/heads/${branch}"; then
            git worktree add "${path}" "${branch}"
          else
            git worktree add -b "${branch}" "${path}"
          fi
          bash deployment/scripts/worktree-env.sh "${path}"
          git -C "${path}" submodule update --init --recursive
          # ports already ensured by worktree-env.sh; print URL from .env.local
          port="$(awk -F= '/^PORT=/ { print $2; exit }' "${path}/.env.local")"
          echo "worktree ready: ${path}"
          echo "  open http://localhost:${port}"
          echo "  infra is shared — run 'task start' once from primary if needed"

  start:
    desc: Bring up shared infra from primary (no-op if already healthy).
    cmds:
      - bash deployment/scripts/infra-up.sh

  start:build:
    desc: Bring up shared infra with image rebuild (from primary).
    cmds:
      - task: submodule:init
      - bash deployment/scripts/infra-up.sh --build

  stop:
    desc: Stop shared infra for all worktrees (keeps volumes).
    cmds:
      - docker compose -f deployment/docker-compose.local.yaml down

  reset:
    desc: Stop shared infra and remove volumes (affects all worktrees).
    cmds:
      - docker compose -f deployment/docker-compose.local.yaml down -v

  purge:
    desc: Purge all database data after confirmation.
    cmds:
      - |
          read -r -p "This will delete all MongoDB data. Type PURGE to continue: " confirm
          if [ "$confirm" = "PURGE" ]; then
            docker compose -f deployment/docker-compose.local.yaml down -v --remove-orphans
            docker volume rm -f mongodb_data "${PWD##*/}_mongodb_data" >/dev/null 2>&1 || true
          else
            echo "Purge cancelled."
          fi

  status:
    desc: Show service status.
    cmds:
      - docker compose -f deployment/docker-compose.local.yaml ps

  logs:
    desc: Tail Docker logs.
    cmds:
      - docker compose -f deployment/docker-compose.local.yaml logs -f

  mongo-ping:
    desc: Ping MongoDB from the container.
    cmds:
      - docker exec closer-mongodb mongosh --eval "db.adminCommand('ping')"

  dev:
    desc: Hot reload backend + frontend (shared infra; per-checkout ports via .env.local).
    cmds:
      - task: start
      - |
          sh -c '
          set -euo pipefail
          primary="$(git worktree list --porcelain | awk "/^worktree / { print substr(\$0, 10); exit }")"
          docker compose -f "$primary/deployment/docker-compose.local.yaml" stop attesta
          task dev:server &
          server_pid=$!
          task dev:web &
          web_pid=$!
          wait $server_pid $web_pid
          '

  dev:server:
    desc: Hot reload Go server (ports from .env.local; macOS-safe restart).
    cmds:
      - task: goa:generate
      - sh -c 'cd server && GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go mod tidy'
      - bash deployment/scripts/dev-stop-local.sh
      - sh -c 'cd server && go install github.com/air-verse/air@latest'
      - |
          bash -c '
          set -euo pipefail
          source deployment/scripts/dev-env.sh
          bash deployment/scripts/dev-stop-local.sh --ports-only
          cd server
          bin="$(go env GOBIN)"
          if [ -z "$bin" ]; then bin="$(go env GOPATH)/bin"; fi
          "$bin/air" -c .air.toml
          '

  dev:web:
    desc: Vite dev server (HMR) on VITE_PORT from .env.local.
    cmds:
      - sh -c 'cd web && npm install'
      - |
          bash -c '
          set -euo pipefail
          source deployment/scripts/dev-env.sh
          cd web
          npm run dev -- --port "$VITE_PORT" --strictPort
          '

  run:server:
    desc: Generate Goa artifacts, sync Go deps, and run the backend on localhost:3000.
    cmds:
      - task: goa:generate
      - sh -c 'cd server && GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go mod tidy'
      - |
          sh -c '
          export APPWRITE_ENDPOINT="${APPWRITE_ENDPOINT:-http://localhost/v1}"
          export APPWRITE_INVITE_REDIRECT_URL="${APPWRITE_INVITE_REDIRECT_URL:-http://localhost:3000/invite/accept}"
          export APPWRITE_RESET_REDIRECT_URL="${APPWRITE_RESET_REDIRECT_URL:-http://localhost:3000/reset/confirm}"
          cd server
          GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go run ./cmd/server
          '

  goa:generate:
    desc: Generate Goa code and OpenAPI spec.
    cmds:
      - task: submodule:init
      - sh -c 'cd server && GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go generate ./design'

  goa:generate:all:
    desc: Regenerate Goa artifacts and verify Go build graph.
    cmds:
      - task: goa:generate
      - sh -c 'cd server && GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go test ./...'

  test:
    desc: Run backend unit tests.
    cmds:
      - task: css:lint
      - task: goa:generate
      - sh -c 'cd server && GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go test $(go list ./... | grep -v "/gen")'

  css:lint:
    desc: CSS lint (template inline styles + breakpoint guard + stylelint).
    cmds:
      - bash deployment/scripts/check-template-inline-styles.sh
      - bash deployment/scripts/check-css-breakpoints.sh
      - cd web && { [ -d node_modules ] || npm ci; }
      - cd web && npm run lint:css

  cover:
    desc: Run backend tests with a 90% coverage gate.
    cmds:
      - task: css:lint
      - task: goa:generate
      - |
          sh -c '
          set -eu
          cd server
          min=${COVER_MIN:-90.0}
          GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go test $(go list ./... | grep -v "/gen") -coverprofile=coverage.out
          total=$(GOCACHE=${GOCACHE:-/tmp/gocache-attesta} go tool cover -func=coverage.out | awk "/^total:/ {gsub(/%/, \"\", \$3); print \$3}")
          echo "total coverage: ${total}%"
          awk -v total="$total" -v min="$min" "BEGIN { if ((total+0) < (min+0)) { printf(\"coverage gate failed (< %.1f%%)\\n\", min); exit 1 } }"
          '
