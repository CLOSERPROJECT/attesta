name: 🧪 Tests

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - '*.org'
    branches:
      - master
  push:
    paths-ignore:
      - '*.md'
      - '*.org'
    branches:
      - master

jobs:
  test:
    name: ⏳ Run tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔔 Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: 🥢 Set up go@1.25.5 and task@latest
        uses: jdx/mise-action@v3
      - name: 🧪 Run tests
        run: COVER_MIN=90.0 task cover
        shell: bash
