workflow:
  name: Indium shipment audit
  description: Shipment intake, inspection, and approval with traceable checkpoints.
  steps:
    - id: "1"
      title: Collection and dismantling of indium waste
      order: 1
      organization: closing-the-loop
      substeps:
        - id: "1.1"
          order: 1
          roles:
            - operator
          title: Waste information record
          inputKey: Waste document that provides information on the waste (e.g. batch IDs,
            device type/model, quantities, weight, time of collection, waste
            code).
          inputType: formata
          schema:
            type: object
            properties:
              "Waste information record ":
                type: string
                title: "Waste information record "
              Waste information record:
                title: Waste information record
              Group title:
                type: object
                properties:
                  Batch IDs:
                    type: string
                    title: Batch IDs
                  Device model/type:
                    type: string
                    title: Device model/type
                  Quantities:
                    type: string
                    title: Quantities
                  Weight:
                    type: string
                    title: Weight
                  Time of collection:
                    type: string
                    title: Time of collection
                  Waste code:
                    type: string
                    title: Waste code
                required:
                  - Batch IDs
                  - Device model/type
                  - Quantities
                  - Weight
                  - Time of collection
                  - Waste code
                title: Group title
            required:
              - "Waste information record "
              - Waste information record
              - Group title
            title: Waste information
          uiSchema:
            Waste information record:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "1.2"
          order: 2
          title: Waste shipment documents (for received waste
          inputKey: Legally required waste transport documents for receiving the
            indiumcontaining waste. (Basel - hazardous or Annex VII -
            nonhazardous)
          roles:
            - operator
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
              Multi choice field:
                type: array
                uniqueItems: true
                items:
                  enum:
                    - L1
                    - L2
                title: Multi choice field
            required:
              - String field
              - File field
              - Multi choice field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
            Multi choice field:
              ui:components:
                arrayField: multiEnumField
        - id: "1.3"
          order: 3
          title: Dismantling log
          inputKey: Record of dismantling steps and material categorization
          roles:
            - operator
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              Choice field:
                enum:
                  - L1
                  - L2
                  - L3
                  - L4
                title: Choice field
            required:
              - String field
              - Choice field
            title: Form title
          uiSchema:
            Choice field:
              ui:components:
                stringField: enumField
                selectWidget: radioWidget
              ui:options:
                useLabel: false
        - id: "1.4"
          order: 4
          title: Indium-containing fraction weights
          inputKey: Measured weight of LCD glass from dismantled waste.
          roles:
            - operator
          inputType: formata
          schema:
            type: object
            required:
              - File field
              - String field
            title: Form title
            properties:
              File field:
                title: File field
              String field:
                type: string
                title: String field
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "1.5"
          order: 5
          title: Waste shipment documentation
          inputKey: Consolidated batch-level details of waste sent downstream, along with
            all legally required waste transport documents.
          roles:
            - operator
          inputType: formata
          schema:
            type: object
            required:
              - String field
              - File field
            title: Form title
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
    - id: "2"
      title: Quantification of indium content in waste sample
      order: 2
      organization: due2lab
      substeps:
        - id: "2.1"
          order: 1
          title: Indium waste analysis results
          inputKey: Report containing all test results in terms of Indium content and
            presence of other valuable chemical elements
          roles:
            - analyst
          inputType: formata
          schema:
            type: object
            required:
              - File field
              - String field
            title: Form title
            properties:
              File field:
                title: File field
              String field:
                type: string
                title: String field
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
    - id: "3"
      title: Indium recovery and refinement
      order: 3
      organization: critical
      substeps:
        - id: "3.1"
          order: 1
          title: Indium recovery results report
          inputKey: Consolidated analysis report on indium recovery outcomes.
          roles:
            - projectmanager
          inputType: formata
          schema:
            type: object
            required:
              - File field
              - String field
            title: Form title
            properties:
              File field:
                title: File field
              String field:
                type: string
                title: String field
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
            String field:
              ui:components:
                textWidget: textareaWidget
        - id: "3.2"
          order: 2
          title: Process information and images
          inputKey: A report that provides basic information, e.g., steps followed,
            success or failure of each step, potential advantages and
            disadvantages, images, etc.
          roles:
            - projectmanager
          inputType: formata
          schema:
            type: object
            required:
              - String field
              - List title
            title: Form title
            properties:
              String field:
                type: string
                title: String field
              List title:
                type: array
                items:
                  title: File field
                title: List title
          uiSchema:
            List title:
              items:
                ui:components:
                  unknownField: unknownNativeFileField
    - id: "4"
      title: TMIn production
      order: 4
      organization: dockweiler
      substeps:
        - id: "4.1"
          order: 1
          title: Transfilling document
          inputKey: Document outlining canister preparation and usage
          roles:
            - headofrd
            - tbsoperator
          inputType: formata
          schema:
            type: object
            properties:
              String field 1:
                type: string
                title: String field 1
              File field:
                title: File field
            required:
              - String field 1
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "4.2"
          order: 2
          title: Safety Data Sheet
          inputKey: Information on safe handling, hazards, and regulatory compliance of
            TMIn
          roles:
            - headofshipping
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
            required:
              - String field
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "4.3"
          order: 3
          title: Certificate of Analysis
          inputKey: Document that verifies TMIn quality/purity, composition, and
            compliance. It may also contain other relevant info such as batch
            ID, safety info, etc
          roles:
            - headofquality
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
            required:
              - String field
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
    - id: "5"
      title: Advanced In precursor production
      order: 5
      organization: ifw
      substeps:
        - id: "5.1"
          order: 1
          title: Precursor synthesis conditions report
          inputKey: Detailed record of synthesis conditions, including solvents,
            temperatures, parameters and ligand information
          roles:
            - analyticalchemist
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
            required:
              - String field
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "5.2"
          order: 2
          title: Precursor testing report
          inputKey: Results of precursor initial screening and testing (e.g. thin-film
            processing and characterization)
          roles:
            - chemicalprocesstechnologist
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
            required:
              - String field
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "5.3"
          order: 3
          title: Advanced indium precursor data sheet
          inputKey: Document that summarizes the properties and specifications of the
            synthesized compound
          roles:
            - projectmanager
          inputType: formata
          schema:
            type: object
            properties:
              String field:
                type: string
                title: String field
              File field:
                title: File field
            required:
              - String field
              - File field
            title: Form title
          uiSchema:
            File field:
              ui:components:
                unknownField: unknownNativeFileField
    - id: "6"
      title: Secondary indium deposition for wafer and electronic device fabrication
      order: 6
      organization: atlant-3d
      substeps: []

