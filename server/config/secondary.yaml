workflow:
  name: Gallium shipment audit
  steps:
    - id: "1"
      title: Shipment intake
      organization: organization-1
      order: 0
      substeps:
        - id: "1.1"
          order: 1
          title: Record shipment weight (kg)
          inputKey: shipmentKg
          roles:
            - chemist
          inputType: formata
          schema:
            type: object
            properties:
              shipmentKg:
                type: number
                title: shipmentKg
            required:
              - shipmentKg
            title: Record shipment weight
        - id: "1.2"
          order: 2
          title: Attach shipment reference
          inputKey: shipmentRef
          roles:
            - chemist
          inputType: formata
          schema:
            type: object
            properties:
              shipmentRef:
                type: string
                title: shipmentRef
            required:
              - shipmentRef
            title: Shipment reference
    - id: "2"
      title: Inspection
      order: 1
      organization: organization-1
      substeps:
        - id: "2.1"
          order: 1
          title: Upload inspection report
          inputKey: report
          roles:
            - mechanic
          inputType: formata
          schema:
            type: object
            properties:
              Report:
                title: Report
            required:
              - Report
            title: Inspection report
          uiSchema:
            Report:
              ui:components:
                unknownField: unknownNativeFileField
        - id: "2.2"
          title: Record inspection outcome
          order: 2
          roles:
            - mechanic
          inputKey: inspectionOutcome
          inputType: formata
          schema:
            type: object
            required:
              - outcome
              - inspector
            properties:
              outcome:
                type: string
                title: Outcome
                enum:
                  - accepted
                  - rejected
                  - needs_review
              inspector:
                type: string
                title: Inspector
              comments:
                type: string
                title: Comments
          uiSchema:
            comments:
              ui:components:
                textWidget: textareaWidget
    - id: "3"
      title: Approval
      order: 3
      organization: organization-1
      substeps:
        - id: "3.1"
          order: 1
          title: Approve shipment
          inputKey: approval
          roles:
            - supervisor
          inputType: formata
          schema:
            type: object
            required:
              - Approval
            title: Approve shipment
            properties:
              Approval:
                type: string
                title: Approval
organizations:
  - slug: organization-1
    name: Organization 1

roles:
  - orgSlug: organization-1
    slug: chemist
    name: Chemist
    color: var(--role-blue)
  - orgSlug: organization-1
    slug: mechanic
    name: Mechanic
    color: var(--role-blue)
  - orgSlug: organization-1
    slug: supervisor
    name: Supervisor
    color: var(--role-cyan)

departments:
  - id: chemist
    name: Chemist
    color: var(--role-blue)
  - id: mechanic
    name: Mechanic
    color: var(--role-blue)
  - id: supervisor
    name: Supervisor
    color: var(--role-cyan)
users:
  - id: u4
    name: User 4
    departmentId: chemist
  - id: u5
    name: User 5
    departmentId: mechanic
  - id: u6
    name: User 6
    departmentId: supervisor
dpp:
  enabled: true
  gtin: "09506000134352"
  lotInputKey: shipmentRef
  lotDefault: ""
  serialInputKey: ""
  serialStrategy: process_id_hex
  productName: Gallium shipment audit
  productDescription: Shipment intake, inspection, and approval with traceable checkpoints
  ownerName: Attesta Demo Operator
