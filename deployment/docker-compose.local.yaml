include:
  - path: ./appwrite/docker-compose.appwrite.yaml
    env_file:
      - ./appwrite/.env.appwrite.example

services:
  mongodb:
    image: mongo:7.0
    container_name: closer-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.50.0
    container_name: attesta-cerbos
    restart: unless-stopped
    command: ["server", "--config=/config/config.yaml"]
    ports:
      - "3592:3592"
    volumes:
      - ../cerbos/policies:/policies
      - ../cerbos/config:/config

  mongo-express:
    image: mongo-express:1.0.2
    container_name: closer-mongo-express
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: secret
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
    ports:
      - "8081:8081"
    depends_on:
      - mongodb

  attesta:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.local
    container_name: attesta
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      CERBOS_URL: http://cerbos:3592
      APPWRITE_ENDPOINT: http://appwrite/v1
      APPWRITE_PROJECT_ID: ${APPWRITE_PROJECT_ID:-local-dev-project}
      APPWRITE_API_KEY: ${APPWRITE_API_KEY:-replace-me-after-appwrite-bootstrap}
      APPWRITE_INVITE_REDIRECT_URL: ${APPWRITE_INVITE_REDIRECT_URL:-http://localhost:3030/invite/accept}
      APPWRITE_RESET_REDIRECT_URL: ${APPWRITE_RESET_REDIRECT_URL:-http://localhost:3030/reset/confirm}
      APPWRITE_ORG_ASSETS_BUCKET: ${APPWRITE_ORG_ASSETS_BUCKET:-org-assets}
    ports:
      - "3030:3000"
    networks:
      - default
      - appwrite
    depends_on:
      - mongodb
      - cerbos
      - appwrite

volumes:
  mongodb_data:
    driver: local
