x-appwrite-service: &x-appwrite-service
  env_file:
    - ./appwrite/.env.appwrite.coolify

services:
  traefik:
    image: traefik:2.11
    container_name: appwrite-traefik
    command:
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`,`appwrite`)
      - --entrypoints.appwrite_web.address=:80
      - --entrypoints.appwrite_websecure.address=:443
    restart: unless-stopped
    environment:
      SERVICE_FQDN_APPWRITE_80:
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-config:/storage/config:ro
      - appwrite-certificates:/storage/certificates:ro
    depends_on:
      - appwrite
    networks:
      - gateway
      - appwrite

  appwrite:
    image: appwrite/appwrite:1.8.1
    container_name: appwrite
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=appwrite
      - traefik.http.services.appwrite_api.loadbalancer.server.port=80
      - traefik.http.routers.appwrite_api_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_api_http.rule=PathPrefix(`/`)
      - traefik.http.routers.appwrite_api_http.service=appwrite_api
      - traefik.http.routers.appwrite_api_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_api_https.rule=PathPrefix(`/`)
      - traefik.http.routers.appwrite_api_https.service=appwrite_api
      - traefik.http.routers.appwrite_api_https.tls=true
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-imports:/storage/imports:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
    depends_on:
      - mariadb
      - redis

  appwrite-console:
    image: appwrite/console:7.5.7
    container_name: appwrite-console
    restart: unless-stopped
    networks:
      - appwrite
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=appwrite
      - traefik.http.services.appwrite_console.loadbalancer.server.port=80
      - traefik.http.routers.appwrite_console_http.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_console_http.rule=PathPrefix(`/console`)
      - traefik.http.routers.appwrite_console_http.service=appwrite_console
      - traefik.http.routers.appwrite_console_https.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_console_https.rule=PathPrefix(`/console`)
      - traefik.http.routers.appwrite_console_https.service=appwrite_console
      - traefik.http.routers.appwrite_console_https.tls=true

  appwrite-realtime:
    image: appwrite/appwrite:1.8.1
    entrypoint: realtime
    container_name: appwrite-realtime
    <<: *x-appwrite-service
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.constraint-label-stack=appwrite
      - traefik.docker.network=appwrite
      - traefik.http.services.appwrite_realtime.loadbalancer.server.port=80
      - traefik.http.routers.appwrite_realtime_ws.entrypoints=appwrite_web
      - traefik.http.routers.appwrite_realtime_ws.rule=PathPrefix(`/v1/realtime`)
      - traefik.http.routers.appwrite_realtime_ws.service=appwrite_realtime
      - traefik.http.routers.appwrite_realtime_wss.entrypoints=appwrite_websecure
      - traefik.http.routers.appwrite_realtime_wss.rule=PathPrefix(`/v1/realtime`)
      - traefik.http.routers.appwrite_realtime_wss.service=appwrite_realtime
      - traefik.http.routers.appwrite_realtime_wss.tls=true
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis

  appwrite-worker-audits:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-audits
    container_name: appwrite-worker-audits
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-worker-webhooks:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-webhooks
    container_name: appwrite-worker-webhooks
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-worker-deletes:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-deletes
    container_name: appwrite-worker-deletes
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-uploads:/storage/uploads:rw
      - appwrite-cache:/storage/cache:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-certificates:/storage/certificates:rw

  appwrite-worker-databases:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-databases
    container_name: appwrite-worker-databases
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-worker-builds:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-builds
    container_name: appwrite-worker-builds
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - appwrite-builds:/storage/builds:rw
      - appwrite-uploads:/storage/uploads:rw

  appwrite-worker-certificates:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-certificates
    container_name: appwrite-worker-certificates
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
    volumes:
      - appwrite-config:/storage/config:rw
      - appwrite-certificates:/storage/certificates:rw

  appwrite-worker-functions:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-functions
    container_name: appwrite-worker-functions
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb
      - openruntimes-executor

  appwrite-worker-mails:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-mails
    container_name: appwrite-worker-mails
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis

  appwrite-worker-messaging:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-messaging
    container_name: appwrite-worker-messaging
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-uploads:/storage/uploads:rw
    depends_on:
      - redis

  appwrite-worker-migrations:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-migrations
    container_name: appwrite-worker-migrations
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-imports:/storage/imports:rw
    depends_on:
      - mariadb

  appwrite-task-maintenance:
    image: appwrite/appwrite:1.8.1
    entrypoint: maintenance
    container_name: appwrite-task-maintenance
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis

  appwrite-task-stats-resources:
    image: appwrite/appwrite:1.8.1
    entrypoint: stats-resources
    container_name: appwrite-task-stats-resources
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-worker-stats-resources:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-stats-resources
    container_name: appwrite-worker-stats-resources
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-worker-stats-usage:
    image: appwrite/appwrite:1.8.1
    entrypoint: worker-stats-usage
    container_name: appwrite-worker-stats-usage
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - redis
      - mariadb

  appwrite-task-scheduler-functions:
    image: appwrite/appwrite:1.8.1
    entrypoint: schedule-functions
    container_name: appwrite-task-scheduler-functions
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis

  appwrite-task-scheduler-executions:
    image: appwrite/appwrite:1.8.1
    entrypoint: schedule-executions
    container_name: appwrite-task-scheduler-executions
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis

  appwrite-task-scheduler-messages:
    image: appwrite/appwrite:1.8.1
    entrypoint: schedule-messages
    container_name: appwrite-task-scheduler-messages
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite
    depends_on:
      - mariadb
      - redis

  appwrite-assistant:
    image: appwrite/assistant:0.8.4
    container_name: appwrite-assistant
    <<: *x-appwrite-service
    restart: unless-stopped
    networks:
      - appwrite

  appwrite-browser:
    image: appwrite/browser:0.3.2
    container_name: appwrite-browser
    restart: unless-stopped
    networks:
      - appwrite

  openruntimes-executor:
    image: openruntimes/executor:0.7.22
    container_name: openruntimes-executor
    hostname: exc1
    restart: unless-stopped
    stop_signal: SIGINT
    networks:
      - appwrite
      - runtimes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appwrite-builds:/storage/builds:rw
      - appwrite-functions:/storage/functions:rw
      - appwrite-sites:/storage/sites:rw
      - /tmp:/tmp:rw
    environment:
      OPR_EXECUTOR_DOCKER_HUB_PASSWORD: ${_APP_DOCKER_HUB_PASSWORD:-}
      OPR_EXECUTOR_DOCKER_HUB_USERNAME: ${_APP_DOCKER_HUB_USERNAME:-}
      OPR_EXECUTOR_ENV: ${_APP_ENV:-production}
      OPR_EXECUTOR_INACTIVE_TRESHOLD: ${_APP_COMPUTE_INACTIVE_THRESHOLD:-60}
      OPR_EXECUTOR_LOGGING_CONFIG: ${_APP_LOGGING_CONFIG:-}
      OPR_EXECUTOR_MAINTENANCE_INTERVAL: ${_APP_COMPUTE_MAINTENANCE_INTERVAL:-3600}
      OPR_EXECUTOR_NETWORK: ${_APP_COMPUTE_RUNTIMES_NETWORK:-runtimes}
      OPR_EXECUTOR_RUNTIME_VERSIONS: v5
      OPR_EXECUTOR_RUNTIMES: ${_APP_FUNCTIONS_RUNTIMES:-node-16.0,php-8.0,python-3.9,ruby-3.0},${_APP_SITES_RUNTIMES:-static-1,node-22,flutter-3.29}
      OPR_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:-}
      OPR_EXECUTOR_STORAGE_BACKBLAZE_ACCESS_KEY: ${_APP_STORAGE_BACKBLAZE_ACCESS_KEY:-}
      OPR_EXECUTOR_STORAGE_BACKBLAZE_BUCKET: ${_APP_STORAGE_BACKBLAZE_BUCKET:-}
      OPR_EXECUTOR_STORAGE_BACKBLAZE_REGION: ${_APP_STORAGE_BACKBLAZE_REGION:-us-west-004}
      OPR_EXECUTOR_STORAGE_BACKBLAZE_SECRET: ${_APP_STORAGE_BACKBLAZE_SECRET:-}
      OPR_EXECUTOR_STORAGE_DEVICE: ${_APP_STORAGE_DEVICE:-local}
      OPR_EXECUTOR_STORAGE_DO_SPACES_ACCESS_KEY: ${_APP_STORAGE_DO_SPACES_ACCESS_KEY:-}
      OPR_EXECUTOR_STORAGE_DO_SPACES_BUCKET: ${_APP_STORAGE_DO_SPACES_BUCKET:-}
      OPR_EXECUTOR_STORAGE_DO_SPACES_REGION: ${_APP_STORAGE_DO_SPACES_REGION:-us-east-1}
      OPR_EXECUTOR_STORAGE_DO_SPACES_SECRET: ${_APP_STORAGE_DO_SPACES_SECRET:-}
      OPR_EXECUTOR_STORAGE_LINODE_ACCESS_KEY: ${_APP_STORAGE_LINODE_ACCESS_KEY:-}
      OPR_EXECUTOR_STORAGE_LINODE_BUCKET: ${_APP_STORAGE_LINODE_BUCKET:-}
      OPR_EXECUTOR_STORAGE_LINODE_REGION: ${_APP_STORAGE_LINODE_REGION:-eu-central-1}
      OPR_EXECUTOR_STORAGE_LINODE_SECRET: ${_APP_STORAGE_LINODE_SECRET:-}
      OPR_EXECUTOR_STORAGE_S3_ACCESS_KEY: ${_APP_STORAGE_S3_ACCESS_KEY:-}
      OPR_EXECUTOR_STORAGE_S3_BUCKET: ${_APP_STORAGE_S3_BUCKET:-}
      OPR_EXECUTOR_STORAGE_S3_ENDPOINT: ${_APP_STORAGE_S3_ENDPOINT:-}
      OPR_EXECUTOR_STORAGE_S3_REGION: ${_APP_STORAGE_S3_REGION:-us-east-1}
      OPR_EXECUTOR_STORAGE_S3_SECRET: ${_APP_STORAGE_S3_SECRET:-}
      OPR_EXECUTOR_STORAGE_WASABI_ACCESS_KEY: ${_APP_STORAGE_WASABI_ACCESS_KEY:-}
      OPR_EXECUTOR_STORAGE_WASABI_BUCKET: ${_APP_STORAGE_WASABI_BUCKET:-}
      OPR_EXECUTOR_STORAGE_WASABI_REGION: ${_APP_STORAGE_WASABI_REGION:-eu-central-1}
      OPR_EXECUTOR_STORAGE_WASABI_SECRET: ${_APP_STORAGE_WASABI_SECRET:-}

  mariadb:
    image: mariadb:10.11
    container_name: appwrite-mariadb
    restart: unless-stopped
    networks:
      - appwrite
    volumes:
      - appwrite-mariadb:/var/lib/mysql:rw
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MYSQL_DATABASE: ${_APP_DB_SCHEMA:-appwrite}
      MYSQL_PASSWORD: ${_APP_DB_PASS:-}
      MYSQL_ROOT_PASSWORD: ${_APP_DB_ROOT_PASS:-}
      MYSQL_USER: ${_APP_DB_USER:-}
    command: "mysqld --innodb-flush-method=fsync"

  redis:
    image: redis:7.2.4-alpine
    container_name: appwrite-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
    networks:
      - appwrite
    volumes:
      - appwrite-redis:/data:rw

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  cerbos:
    build:
      context: .
      dockerfile: deployment/Dockerfile.cerbos
    restart: unless-stopped
    command:
      - server
      - --config=/config/config.yaml

  attesta:
    build:
      context: .
      dockerfile: deployment/Dockerfile.coolify
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${SERVICE_NAME_MONGODB:-mongodb}:27017
      CERBOS_URL: http://${SERVICE_NAME_CERBOS:-cerbos}:3592
      APPWRITE_ENDPOINT: http://${SERVICE_NAME_APPWRITE:-appwrite}:80/v1
      APPWRITE_PROJECT_ID:
      APPWRITE_API_KEY:
      APPWRITE_INVITE_REDIRECT_URL:
      APPWRITE_RESET_REDIRECT_URL:
      APPWRITE_ORG_ASSETS_BUCKET: org-assets
      SERVICE_FQDN_ATTESTA_3000:
    networks:
      - default
      - appwrite
    depends_on:
      - mongodb
      - cerbos
      - appwrite

  mongoexpress:
    image: mongo-express:1.0.2
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${SERVICE_NAME_MONGODB:-mongodb}:27017
      SERVICE_FQDN_MONGOEXPRESS_8081:
    depends_on:
      - mongodb

networks:
  gateway:
    name: gateway
  appwrite:
    name: appwrite
  runtimes:
    name: runtimes

volumes:
  appwrite-mariadb:
  appwrite-redis:
  appwrite-cache:
  appwrite-uploads:
  appwrite-imports:
  appwrite-certificates:
  appwrite-functions:
  appwrite-sites:
  appwrite-builds:
  appwrite-config:
  mongodb_data:
