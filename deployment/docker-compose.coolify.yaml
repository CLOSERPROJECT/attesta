services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db

  cerbos:
    build:
      context: .
      dockerfile: deployment/Dockerfile.cerbos
    restart: unless-stopped
    command:
      - server
      - --config=/config/config.yaml

  attesta:
    build:
      context: .
      dockerfile: deployment/Dockerfile.coolify
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://${SERVICE_NAME_MONGODB:-mongodb}:27017
      CERBOS_URL: http://${SERVICE_NAME_CERBOS:-cerbos}:3592
      APPWRITE_ENDPOINT: https://appwrite-attesta.apps.forkbomb.eu/v1
      APPWRITE_PROJECT_ID:
      APPWRITE_API_KEY:
      APPWRITE_INVITE_REDIRECT_URL:
      APPWRITE_RESET_REDIRECT_URL:
      APPWRITE_ORG_ASSETS_BUCKET: org-assets
      SERVICE_FQDN_ATTESTA_3000:
    depends_on:
      - mongodb
      - cerbos

  mongoexpress:
    image: mongo-express:1.0.2
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${SERVICE_NAME_MONGODB:-mongodb}:27017
      SERVICE_FQDN_MONGOEXPRESS_8081:
    depends_on:
      - mongodb

volumes:
  mongodb_data:
